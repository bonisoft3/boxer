say:
  lint:
    do: "cargo clippy -- -D warnings && cargo fmt --check"
  launch:
    do: "cargo run"
  release:
    do: "goreleaser release --snapshot --clean"
  integrate:
    # Skip the depot cache for local buildkit; CI re-enables it via action flags.
    args: "--bake --no-up --no-cache-from --no-cache-to"
